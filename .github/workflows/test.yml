name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - run: uv run --python 3.12 python -m unittest discover -s tests -v
      - run: uv run --python 3.12 evidencebench validate data/dev-v1.jsonl
